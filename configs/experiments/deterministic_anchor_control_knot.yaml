_base_: ./main_location_split_rollout_only.yaml

model:
  use_anchor_latent: true
  anchor_dim: 6
  residual_diffusion_enabled: false

residual_diffusion:
  enabled: false
  target_type: x0
  normalize_residual: true
  residual_scale: 0.0
  residual_clip_std: 3.0
  sample_steps: 50

anchor_residual_diffusion:
  enabled: false
  target_type: x0
  normalize_residual: true
  residual_scale: 0.5
  residual_clip_std: 3.0
  sample_steps: 50

sampling:
  use_residual_diffusion: false
  use_anchor_residual_diffusion: false

losses:
  anchor_weight: 1.0
  final_anchor_weight: 2.0
  residual_diffusion_weight: 0.0
  anchor_residual_diffusion_weight: 0.0
  realism_mmd_weight: 0.0

training:
  batch_size: 128
  num_workers: 14
  num_epochs: 15

experiment:
  name: deterministic_anchor_control_knot
  type: ablation
  cache_from: main_location_split
  note: deterministic anchor latent + control-knot decoder without anchor diffusion
