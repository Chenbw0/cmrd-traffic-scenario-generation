_base_: ./main_location_split.yaml

losses:
  smoothness_weight: 0.0
  realism_mmd_weight: 0.0
  sample_path_loss_enabled: true
  sample_path_loss_weight: 0.2
  sample_path_steps: 8
  sample_path_every_n_batches: 1
  sample_path_batch_fraction: 0.5

sampling:
  sampler: ddim
  ddim_eta: 0.0
  sample_steps: 100

training:
  batch_size: 128
  num_workers: 14
  num_epochs: 10

experiment:
  name: generator_fix_sample_path_only
  type: ablation
  cache_from: main_location_split
  train:
    enabled: true
    resume: false
    num_epochs: 10
  sample:
    enabled: true
    num_slices: 16
    num_rollouts_per_slice: 1
