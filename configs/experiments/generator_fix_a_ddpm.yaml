_base_: ./main_location_split.yaml

losses:
  smoothness_weight: 0.0
  realism_mmd_weight: 0.0
  sample_path_loss_enabled: false
  sample_path_loss_weight: 0.0

sampling:
  sampler: ddpm
  sample_steps: 100

experiment:
  name: generator_fix_a_ddpm
  type: ablation
  cache_from: main_location_split
  train:
    enabled: true
    resume: false
    num_epochs: 10
  sample:
    enabled: true
    num_slices: 16
    num_rollouts_per_slice: 1
